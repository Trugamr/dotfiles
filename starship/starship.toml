# Don't print a new line at the start of the prompt
add_newline = false

prompt_order = ["username", "directory", "hostname", "kubernetes", "git_branch", "git_commit", "git_state", "git_status", "hg_branch", "docker_context", "package", "dotnet", "elixir", "elm", "erlang", "golang", "java", "julia", "nim", "nodejs", "ocaml", "php", "purescript", "python", "ruby", "rust", "terraform", "zig", "nix_shell", "conda", "memory_usage", "aws", "env_var", "crystal", "cmd_duration", "custom", "line_break", "jobs", "battery", "time", "character"]

# Replace the "❯" symbol in the prompt with "➜"
[character]      # The name of the module we are configuring is "character"
symbol = "➜"     # The "symbol" segment is being set to "➜"

[hostname]
ssh_only = false
style="green"
prefix="beast"
trim_at="BEAST"
disabled = false

[username]
show_always = true
disabled = false 
